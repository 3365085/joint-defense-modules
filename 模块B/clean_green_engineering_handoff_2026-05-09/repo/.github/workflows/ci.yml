name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest PyYAML pandas numpy opencv-python-headless pillow tqdm matplotlib
      - name: Static compile
        run: python -m compileall -q model_security_gate scripts tests
      - name: Pytest
        run: python -m pytest -q
      - name: CLI help smoke
        run: |
          python scripts/ci_help_smoke_all.py --allow-missing-heavy-deps
