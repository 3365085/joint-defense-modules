[workspace]
authors = ["Module A Delivery <delivery@local>"]
channels = ["pytorch", "nvidia", "conda-forge"]
name = "module-a-video-defense-runtime"
platforms = ["win-64"]
version = "1.0.0"

[tasks]
install-runtime = "python -m pip install --upgrade pip && python -m pip install --pre --upgrade --force-reinstall --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/nightly/cu128 && python -m pip install -r requirements-runtime.txt"
verify-ai = "python -c \"import torch; print(torch.__version__); print('cuda=', torch.cuda.is_available()); print(torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'none')\""
app = "python tools/module_a_monitor_app.py"
monitor = "python tools/module_a_monitor_app.py --auto-port"
monitor-open-external = "python tools/module_a_monitor_app.py --open-browser --auto-port"

[dependencies]
python = "3.11.*"
pip = "*"
numpy = ">=1.26,<2"
libopencv = ">=4.6.0,<5"
cuda-nvcc = "12.8.*"
cuda-libraries-dev = "12.8.*"
