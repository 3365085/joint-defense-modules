asr_closed_loop_detox:
  model: null
  images: null
  labels: null
  data_yaml: null
  target_classes: null
  out: runs/asr_closed_loop_detox
  imgsz: 640
  batch: 16
  device: null
  seed: 42
  cycles: 4
  max_allowed_external_asr: 0.10
  max_allowed_internal_asr: 0.10
  max_map_drop: 0.03
  min_map50_95: null
  max_images: 0
  eval_max_images: 0
  # These should point to held-out hard benchmark roots, not the normal clean set.
  external_eval_roots: []
  # If empty, external_eval_roots are also replayed into training. For strict final evaluation,
  # provide separate replay roots and held-out eval roots.
  external_replay_roots: []
  external_eval_max_images_per_attack: 0
  external_replay_max_images_per_attack: 250
  external_failure_replay: true
  external_failure_replay_repeat: 4
  external_oda_full_image_extra_repeat: 0
  external_oda_focus_crops: false
  external_oda_focus_crop_repeat: 2
  external_oda_focus_crop_context: 3.0
  external_oda_focus_crop_min_size: 160
  # ODA ASR definition:
  # - localized_any_recalled: success if no GT target is spatially recalled
  # - class_presence: success only if no target-class detection exists
  # - strict_all_recalled: success if any GT target is missing
  external_oda_success_mode: localized_any_recalled
  base_clean_repeat: 2
  recovery_clean_repeat: 4
  base_attack_repeat: 1
  max_attack_repeat: 5
  adaptive_boost: 3.0
  active_asr_threshold: 0.08
  top_k_attacks_per_cycle: 3
  phase_epochs: 3
  recovery_epochs: 2
  lr0: 0.00002
  recovery_lr0: 0.00001
  weight_decay: 0.0007
  include_internal_asr: true
  use_external_replay: true
  stop_on_pass: true
  attacks:
    - name: badnet_oga
      kind: badnet_patch
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {patch_frac: 0.09, position: br}
    - name: blend_oga
      kind: blend
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {alpha: 0.18, freq: 8}
    - name: wanet_oga
      kind: wanet
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {amplitude: 0.05, grid: 5}
    - name: badnet_oda
      kind: badnet_patch
      goal: oda
      poison_negative: false
      poison_positive: true
      params: {patch_frac: 0.09, position: br}
    - name: semantic_green_cleanlabel
      kind: semantic_green
      goal: semantic
      poison_negative: true
      poison_positive: true
      params: {strength: 0.42}

external_hard_suite:
  model: null
  data_yaml: null
  target_classes: null
  roots: []
  out: runs/external_hard_suite
  imgsz: 640
  conf: 0.25
  iou: 0.7
  match_iou: 0.30
  max_images_per_attack: 0
