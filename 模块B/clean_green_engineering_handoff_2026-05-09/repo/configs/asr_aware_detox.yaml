asr_aware_detox:
  # Use this after pseudo/feature-only smoke detox fails ASR.
  # Requires audited labels; do not use self-pseudo labels for final safety claims.
  model: null
  images: null
  labels: null
  data_yaml: null
  target_classes: null
  out: runs/asr_aware_detox
  imgsz: 640
  batch: 16
  device: null
  cycles: 3
  epochs_per_cycle: 10
  lr0: 0.00002
  weight_decay: 0.0007
  max_allowed_asr: 0.10
  max_map_drop: 0.03
  include_clean_repeat: 2
  include_attack_repeat: 2
  max_images: 0
  eval_max_images: 0
  attacks:
    - name: badnet_oga
      kind: badnet_patch
      goal: oga
      poison_negative: true
      poison_positive: true
      params: {patch_frac: 0.09, position: br}
    - name: blend_oga
      kind: blend
      goal: oga
      poison_negative: true
      poison_positive: true
      params: {alpha: 0.18, freq: 8}
    - name: wanet_oga
      kind: wanet
      goal: oga
      poison_negative: true
      poison_positive: true
      params: {amplitude: 0.05, grid: 5}
    - name: badnet_oda
      kind: badnet_patch
      goal: oda
      poison_negative: false
      poison_positive: true
      params: {patch_frac: 0.09, position: br}
    - name: semantic_green_cleanlabel
      kind: semantic_green
      goal: semantic
      poison_negative: true
      poison_positive: true
      params: {strength: 0.42}

asr_regression:
  model: null
  images: null
  labels: null
  data_yaml: null
  target_classes: null
  out: runs/asr_regression
  imgsz: 640
  conf: 0.25
  iou: 0.7
  match_iou: 0.30
  max_images: 0
  attacks:
    - name: badnet_oga
      kind: badnet_patch
      goal: oga
      params: {patch_frac: 0.09, position: br}
    - name: blend_oga
      kind: blend
      goal: oga
      params: {alpha: 0.18, freq: 8}
    - name: wanet_oga
      kind: wanet
      goal: oga
      params: {amplitude: 0.05, grid: 5}
    - name: badnet_oda
      kind: badnet_patch
      goal: oda
      poison_negative: false
      poison_positive: true
      params: {patch_frac: 0.09, position: br}
    - name: semantic_green_cleanlabel
      kind: semantic_green
      goal: semantic
      params: {strength: 0.42}
