[workspace]
authors = ["Module A Delivery <delivery@local>"]
channels = ["pytorch", "nvidia", "conda-forge"]
name = "module-a-video-defense-runtime"
platforms = ["win-64"]
version = "1.0.0"

[tasks]
install-web = "python -m pip install fastapi \"uvicorn[standard]\""
install-runtime = "cmd /C \"cd /D model && python -m pip install -r requirements-runtime.txt\""
verify-ai = "python -c \"import sys, torch; print(sys.executable); print(torch.__version__); print('cuda=', torch.cuda.is_available()); print(torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'none')\""
app = "cmd /C \"cd /D model && set PYTHONPATH=src&& python -m defense.web.server\""
monitor = "cmd /C \"cd /D model && set PYTHONPATH=src&& python -m defense.web.server --auto-port\""
monitor-open-external = "cmd /C \"cd /D model && set PYTHONPATH=src&& python -m defense.web.server --open-browser --auto-port\""
smoke = "cmd /C \"cd /D model && set PYTHONPATH=src&& python -m compileall -q src tools tests && python -m pytest -q\""

[dependencies]
python = "3.11.*"
pip = "*"
numpy = ">=1.26,<2"
libopencv = ">=4.6.0,<5"
fastapi = ">=0.111"
uvicorn = ">=0.30"
cuda-nvcc = "12.8.*"
cuda-libraries-dev = "12.8.*"
pytest = ">=8"
pyyaml = ">=6"
