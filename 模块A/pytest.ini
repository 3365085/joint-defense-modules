[pytest]
# Module A test configuration.
# * rootdir auto-detection keeps tests runnable from either
#   ``D:\иҒ”еҗҲйҳІеҫЎжЁЎеқ—\жЁЎеқ—A`` or the future joint-repo root.
# * Quiet + short tb by default вҖ” verbose info is one flag away.
# * `filterwarnings` silences the Ultralytics sync / settings noise that
#   clutters test output on first run.
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
filterwarnings =
    ignore::DeprecationWarning:ultralytics.*
    ignore::UserWarning:ultralytics.*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_gpu: marks tests requiring CUDA (auto-skipped when absent)
