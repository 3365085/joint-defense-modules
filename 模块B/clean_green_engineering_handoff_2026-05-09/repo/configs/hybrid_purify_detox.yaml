hybrid_purify_detox:
  model: null
  teacher_model: null
  images: null
  labels: null
  data_yaml: null
  target_classes: null
  external_eval_roots: []
  external_replay_roots: []
  out: runs/hybrid_purify_detox
  imgsz: 640
  batch: 8
  device: null
  cycles: 4
  phase_epochs: 2
  feature_epochs: 2
  recovery_epochs: 2
  max_allowed_external_asr: 0.10
  max_allowed_internal_asr: 0.10
  max_map_drop: 0.03
  # Optional exploration gate for intermediate candidates. Final pass still
  # uses max_map_drop above.
  selection_max_map_drop: null
  external_eval_max_images_per_attack: 0
  external_replay_max_images_per_attack: 250
  external_failure_replay: true
  external_failure_replay_repeat: 4
  # Extra full-image repeats for ODA failures. Unlike target crops, these keep
  # the external trigger/context intact while making decoded-candidate ODA
  # recall repair dominate the phase batches.
  external_oda_full_image_extra_repeat: 0
  # Optional ODA-focused replay: when an external ODA sample succeeds, add
  # target-centered crops with correct labels so localization/recall repair
  # sees the failed helmet/head boxes at higher resolution.
  external_oda_focus_crops: false
  external_oda_focus_crop_repeat: 2
  external_oda_focus_crop_context: 3.0
  external_oda_focus_crop_min_size: 160
  # ODA ASR definition:
  # - localized_any_recalled: success if no GT target is spatially recalled
  # - class_presence: success only if no target-class detection exists
  # - strict_all_recalled: success if any GT target is missing
  external_oda_success_mode: localized_any_recalled
  run_feature_purifier: true
  run_clean_recovery_finetune: true
  # Evaluate feature/recovery checkpoints immediately. This prevents a good
  # intermediate purifier checkpoint from being lost after a later phase
  # worsens blend/semantic/ODA ASR.
  evaluate_each_phase: true
  rollback_bad_phase: true
  rollback_unimproved_phase: false
  external_select_phase_checkpoints: true
  aggressive_mode: false
  aggressive_feature_epochs: 4
  aggressive_phase_epochs: 2
  aggressive_lr_multiplier: 2.0
  aggressive_adv_steps: 4
  aggressive_failure_replay_repeat: 8
  aggressive_top_k_attacks_per_cycle: 2
  defer_clean_recovery_in_aggressive: true
  aggressive_lambda_oda_recall: 2.0
  aggressive_lambda_oda_matched: 1.0
  aggressive_lambda_pgbd_paired: 0.70
  aggressive_lambda_oga_negative: 0.80
  oda_recall_min_conf: 0.45
  oda_recall_iou_threshold: 0.05
  oda_recall_center_radius: 1.50
  oda_recall_topk: 24
  oda_recall_loss_scale: 1.0
  oda_matched_box_weight: 0.25
  oda_matched_teacher_score_weight: 0.25
  oda_matched_teacher_box_weight: 0.10
  oda_matched_min_score: 0.50
  oda_matched_best_score_weight: 0.90
  oda_matched_best_box_weight: 0.35
  oda_matched_localized_margin: 0.10
  oda_matched_localized_margin_weight: 0.25
  pgbd_view_mode: mixed
  pgbd_negative_margin: 0.25
  trusted_teacher_required: false
  amp: false
  # RNP-lite soft suppression is evaluated as a candidate and rolled back if it
  # worsens external ASR or clean mAP. Disable with --no-pre-prune.
  run_pre_prune: true
  pre_prune_top_k: 32
  pre_prune_strength: 0.72
  rnp_unlearn_steps: 40
  rnp_max_images: 96
  rnp_min_score_to_prune: 0.03
  # Do not accept a candidate that makes a single external attack worse.
  require_no_attack_worse: true
  max_single_attack_asr_worsen: 0.02
  external_mean_asr_weight: 0.35
  internal_asr_weight: 0.05
  min_external_asr_improvement: 0.000001
  min_external_mean_improvement: 0.01
  attacks:
    - name: badnet_oga
      kind: badnet_patch
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {patch_frac: 0.09, position: br}
    - name: blend_oga
      kind: blend
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {alpha: 0.18, freq: 8}
    - name: wanet_oga
      kind: wanet
      goal: oga
      poison_negative: true
      poison_positive: false
      params: {amplitude: 0.05, grid: 5}
    - name: badnet_oda
      kind: badnet_patch
      goal: oda
      poison_negative: false
      poison_positive: true
      params: {patch_frac: 0.09, position: br}
    - name: semantic_green_cleanlabel
      kind: semantic_green
      goal: semantic
      poison_negative: true
      poison_positive: true
      params: {strength: 0.42}
